# Habilita suporte ao AndroidX (Obrigatório para Compose)
android.useAndroidX=true
# Habilita conversão automática de dependências antigas
android.enableJetifier=true
# Suprime warning do AGP sobre compileSdk 35
android.suppressUnsupportedCompileSdk=35
# Otimização de memória para o Daemon do Gradle
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
